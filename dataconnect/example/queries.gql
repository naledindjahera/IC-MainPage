query ListAllProjects @auth(level: PUBLIC, insecureReason: "This operation is safe to expose to the public as it lists projects without sensitive user data.") {
  projects {
    id
    title
    description
    user {
      displayName
      email
    }
    technologiesUsed
    liveDemoUrl
    repositoryUrl
    category
    createdAt
    projectImages(orderBy: [{order: ASC}]) {
      imageUrl
      caption
      order
    }
  }
}

query GetMyProfile @auth(level: USER) {
  user(key: {id_expr: "auth.uid"}) {
    id
    displayName
    email
    photoUrl
    bio
    jobTitle
    location
    linkedinUrl
    githubUrl
    personalWebsiteUrl
    createdAt
    educations_on_user(orderBy: [{startDate: DESC}]) {
      id
      institutionName
      degree
      major
      startDate
      endDate
      description
    }
    experiences_on_user(orderBy: [{startDate: DESC}]) {
      id
      companyName
      jobTitle
      startDate
      endDate
      description
    }
    skills_on_user(orderBy: [{name: ASC}]) {
      id
      name
      type
      proficiency
    }
  }
}

mutation CreateNewProject($title: String!, $description: String!, $category: String, $technologiesUsed: [String!], $liveDemoUrl: String, $repositoryUrl: String) @auth(level: USER) {
  project_insert(data: {
    userId_expr: "auth.uid",
    title: $title,
    description: $description,
    createdAt_expr: "request.time",
    category: $category,
    technologiesUsed: $technologiesUsed,
    liveDemoUrl: $liveDemoUrl,
    repositoryUrl: $repositoryUrl
  }) {
    id
  }
}

mutation UpdateUserProfile($bio: String, $jobTitle: String, $location: String, $linkedinUrl: String, $githubUrl: String, $personalWebsiteUrl: String, $photoUrl: String) @auth(level: USER) {
  user_update(key: {id_expr: "auth.uid"}, data: {
    bio: $bio,
    jobTitle: $jobTitle,
    location: $location,
    linkedinUrl: $linkedinUrl,
    githubUrl: $githubUrl,
    personalWebsiteUrl: $personalWebsiteUrl,
    photoUrl: $photoUrl
  }) {
    id
  }
}