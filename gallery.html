<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Gallery | Inspired Creations</title>

<style>
:root{
  --main:#8E1913;
  --hover:#D79F90;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:"Segoe UI", sans-serif;
}

body{
  background:#f2f2f2;
}

/* NAVBAR */
nav{
  background:#f6f6f6;
  padding:18px;
  border-bottom:1px solid #ddd;
}

nav ul{
  list-style:none;
  display:flex;
  justify-content:center;
  gap:25px;
}

nav a{
  color:#8E1913;
  text-decoration:none;
  padding:8px 14px;
  border-radius:5px;
  font-weight:500;
}

nav a:hover{
  background:#D79F90;
  color:black;
}

nav a.active{
  color:black;
  text-decoration:underline;
}

/* TITLE */
.title{
  text-align:center;
  padding:50px 20px 20px;
  font-size:28px;
}

/* GALLERY */
.gallery-item{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:60px;
  padding:60px 20px;
  max-width:1000px;
  margin:auto;
}

.gallery-item.reverse{
  flex-direction:row-reverse;
}

.image-box{
  width:220px;
  height:220px;
  border-radius:12px;
  overflow:hidden;
  background:#8E1913;
  position:relative;
}

.image-box img{
  width:100%;
  height:100%;
  object-fit:cover;
}

.text-box{
  max-width:400px;
}

/* DELETE */
.delete-btn{
  position:absolute;
  top:6px;
  right:6px;
  background:#8E1913;
  color:white;
  border:none;
  width:24px;
  height:24px;
  border-radius:50%;
  cursor:pointer;
}

/* ADMIN PANEL */
.admin-panel{
  display:none;
  position:fixed;
  right:20px;
  top:50%;
  transform:translateY(-50%);
  display:flex;
  flex-direction:column;
  gap:12px;
}

.admin-btn{
  background:#8E1913;
  color:white;
  border:none;
  padding:12px 18px;
  border-radius:10px;
  cursor:pointer;
}

.admin-btn:hover{
  background:#D79F90;
  color:black;
}

/* DOT MENU */
.admin-menu{
  position:fixed;
  bottom:20px;
  right:20px;
}

.admin-dots{
  background:#8E1913;
  color:white;
  width:42px;
  height:42px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:22px;
  cursor:pointer;
}

#adminMenuPanel{
  display:none;
  position:absolute;
  bottom:55px;
  right:0;
  background:white;
  padding:10px;
  border-radius:10px;
}

#adminMenuPanel button{
  width:130px;
  background:#8E1913;
  color:white;
  border:none;
  padding:8px;
  border-radius:6px;
  margin:5px 0;
}

/* FOOTER */
footer{
  background:#f6f6f6;
  color:#8E1913;
  text-align:center;
  padding:22px;
  margin-top:80px;
  font-size:14px;
  border-top:1px solid #ddd;
}
</style>
</head>

<body>

<nav>
<ul>
<li><a href="homepage.html">Home</a></li>
<li><a href="urpottery.html">UR Pottery</a></li>
<li><a href="potterywine.html">Pottery & Wine</a></li>
<li><a href="coupledn.html">Couples Date Night</a></li>
<li><a href="potteryspeed.html">Speeddating</a></li>
<li><a href="gallery.html" class="active">Gallery</a></li>
<li><a href="about.html">About Us</a></li>
<li><a href="contact.html">Contact Us</a></li>
</ul>
</nav>

<h2 class="title">Gallery</h2>

<div id="galleryContainer"></div>

<!-- ADMIN PANEL -->
<div class="admin-panel" id="galleryAdminPanel">

<label class="admin-btn">
Add Gallery Item
<input type="file" hidden accept="image/*" onchange="addGalleryItem(event)">
</label>

</div>

<!-- ADMIN MENU -->
<div class="admin-menu">
<div class="admin-dots" onclick="toggleAdminMenu()">⋯</div>
<div id="adminMenuPanel">
<button onclick="enableGalleryAdmin()">Enable Admin</button>
<button onclick="disableGalleryAdmin()">Disable Admin</button>
</div>
</div>

<footer>
2026 Inspired Creations • Powered by Purple Web Codes
</footer>

<script src="gallery.js"></script>

</body>
</html>
