<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gallery | Inspired Creations</title>
<link rel="stylesheet" href="responsive.css">
<style>
:root{
  --main:#8E1913;
  --hover:#D79F90;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:"Segoe UI", sans-serif;
}

body{
  background:#f2f2f2;
}

/* NAVBAR */
nav{
  background:#f6f6f6;
  padding:18px;
  border-bottom:1px solid #ddd;
}

nav ul{
  list-style:none;
  display:flex;
  justify-content:center;
  gap:25px;
}

nav a{
  color:#8E1913;
  text-decoration:none;
  padding:8px 14px;
  border-radius:5px;
  font-weight:500;
}

nav a:hover{
  background:#D79F90;
  color:black;
}

nav a.active{
  color:black;
  text-decoration:underline;
}

/* TITLE */
.title{
  text-align:center;
  padding:50px 20px 20px;
  font-size:28px;
}

/* GALLERY */
.gallery-item{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:80px;
  padding:60px 20px;
  max-width:1000px;
  margin:auto;
}

.gallery-item.reverse{
  flex-direction:row-reverse;
}

.image-box{
  width:220px;
  height:220px;
  border-radius:12px;
  overflow:hidden;
  background:#8E1913;
  position:relative;
}

.image-box img{
  width:100%;
  height:100%;
  object-fit:cover;
}

.text-box{
  max-width:400px;
}

/* DELETE */
.delete-btn{
  position:absolute;
  top:6px;
  right:6px;
  background:#8E1913;
  color:white;
  border:none;
  width:24px;
  height:24px;
  border-radius:50%;
  cursor:pointer;
}

/* ADMIN PANEL */
.admin-panel{
  display:none;
  position:fixed;
  right:20px;
  top:50%;
  transform:translateY(-50%);
  display:none;
  flex-direction:column;
  gap:12px;
}

.admin-btn{
  background:#8E1913;
  color:white;
  border:none;
  padding:12px 18px;
  border-radius:10px;
  cursor:pointer;
}

.admin-btn:hover{
  background:#D79F90;
  color:black;
}

/* DOT MENU */
.admin-menu{
  position:fixed;
  bottom:20px;
  right:20px;
}

.admin-dots{
  background:#8E1913;
  color:white;
  width:42px;
  height:42px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:22px;
  cursor:pointer;
}

#adminMenuPanel{
  display:none;
  position:absolute;
  bottom:55px;
  right:0;
  background:white;
  padding:10px;
  border-radius:10px;
}

#adminMenuPanel button{
  width:130px;
  background:#8E1913;
  color:white;
  border:none;
  padding:8px;
  border-radius:6px;
  margin:5px 0;
}

.edit-btn{
  position:absolute;
  top:6px;
  left:6px;
  background:#8E1913;
  color:white;
  border:none;
  width:24px;
  height:24px;
  border-radius:50%;
  cursor:pointer;
  font-size:14px;
}

.edit-btn:hover{
  background:#D79F90;
  color:black;
}

/* MODAL BACKGROUND */

.modal{
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.6);
}

/* MODAL BOX */
.modal-content{
  background:white;
  width:90%;
  max-width:500px;
  margin:100px auto;
  padding:30px;
  border-radius:14px;
}

@keyframes modalFade{
  from{
    transform:translateY(-20px);
    opacity:0;
  }
  to{
    transform:translateY(0);
    opacity:1;
  }
}

/* MODAL TITLE */
.modal-content h3{
  margin-bottom:15px;
  color:#8E1913;
}

/* LABELS */
.modal-content label{
  font-size:14px;
  font-weight:600;
  display:block;
  margin-top:10px;
}

/* INPUTS */
.modal input,
.modal textarea{
  width:100%;
  padding:12px;
  border-radius:8px;
  border:2px solid #8E1913;
  resize:none;
  margin-bottom:20px;
}
.modal-content textarea{
  width:100%;
  padding:12px;
  border-radius:8px;
  border:2px solid #8E1913;
  resize:none;
  margin-bottom:20px;
}

.modal-content input:focus,
.modal-content textarea:focus{
  border-color:#8E1913;
  outline:none;
}

/* BUTTON AREA */
.modal-actions{
  margin-top:20px;
  display:flex;
  justify-content:flex-end;
  gap:10px;
}

/* SAVE BUTTON */
.save-btn{
  background:#8E1913;
}

/* CANCEL BUTTON */
.cancel-btn{
  background:#8E1913;
  color:rgb(255, 254, 254);
}

.cancel-btn:hover{
  background:#aaa;
}


/* FOOTER */
footer{
  background:#f6f6f6;
  color:#8E1913;
  text-align:center;
  padding:22px;
  margin-top:80px;
  font-size:14px;
  border-top:1px solid #ddd;
}
</style>
</head>

<body>

<ul>

<li><a href="about.html">About Us</a></li>
<li><a href="contact.html">Contact Us</a></li>
</ul>
</nav>

<h2 class="title">Gallery</h2>

<div id="galleryContainer"></div>

<!-- ADMIN PANEL -->
<div class="admin-panel" id="galleryAdminPanel">

<label class="admin-btn">
Add Gallery Item
<input type="file" hidden accept="image/*" onchange="addGalleryItem(event)">
</label>

</div>

<!-- ADMIN MENU -->
<div class="admin-menu">
<div class="admin-dots" onclick="toggleAdminMenu()">⋯</div>
<div id="adminMenuPanel">
<button onclick="openAdminLogin()">Enable Admin</button>
<button onclick="disableAdmin()">Disable Admin</button>
</div>
</div>

<!-- EDIT GALLERY MODAL -->
<div id="editGalleryModal" class="modal">

<div class="modal-content">

<h3>Edit Gallery Item</h3>

<label>Upload / Replace Image</label>
<input type="file" accept="image/*" onchange="replaceGalleryImage(event)">

<label>Heading</label>
<input id="editTitleInput">

<label>Description</label>
<textarea id="editTextInput" rows="4"></textarea>

<div class="modal-actions">
<button class="admin-btn save-btn" onclick="saveGalleryEdit()">Save</button>
<button class="admin-btn cancel-btn" onclick="closeGalleryEdit()">Cancel</button>
</div>

</div>
</div>


<div id="adminLoginModal" class="modal">
<div class="modal-content">

<h3>Admin Login</h3>

<input id="adminUserInput" placeholder="Username">

<input id="adminPassInput" type="password" placeholder="Password">

<div class="modal-actions">
<button class="admin-btn" onclick="loginAdmin()">Login</button>
<button class="admin-btn cancel-btn" onclick="closeAdminLogin()">Cancel</button>
</div>

</div>
</div>

<div id="changePasswordModal" class="modal">
<div class="modal-content">

<h3>Admin Settings</h3>

<input id="newUsername" placeholder="New Username">

<input id="currentPassword" type="password" placeholder="Current Password">

<input id="newPassword" type="password" placeholder="New Password">

<input id="confirmPassword" type="password" placeholder="Confirm Password">

<div class="modal-actions">
<button class="admin-btn" onclick="updateAdminCredentials()">Save</button>
<button class="admin-btn cancel-btn" onclick="closeChangePassword()">Cancel</button>
</div>

</div>
</div>
<footer>
2026 Inspired Creations • Powered by Purple Web Codes
</footer>

<script src="gallery.js"></script>
<script src="admin.js"></script>
<script type="module" src="firebase.js"></script>

</body>
</html>
