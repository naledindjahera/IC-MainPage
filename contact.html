<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact Us | Inspired Creations</title>
<link rel="stylesheet" href="responsive.css">
<style>
:root{
  --main:#8E1913;
  --hover:#D79F90;
}

/* RESET */
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:"Segoe UI", sans-serif;
}

body{
  background:#f2f2f2;
}

/* NAVBAR */
nav{
  background:#f6f6f6;
  padding:18px;
  border-bottom:1px solid #ddd;
}

nav ul{
  list-style:none;
  display:flex;
  justify-content:center;
  gap:25px;
}

nav a{
  color:#8E1913;
  text-decoration:none;
  padding:8px 14px;
  border-radius:5px;
  font-weight:500;
}

nav a:hover{
  background:#D79F90;
  color:black;
}

nav a.active{
  color:black;
  text-decoration:underline;
}


/* CONTACT CONTAINER */
.container{
  max-width:600px;
  margin:80px auto 40px;
  background:white;
  padding:40px;
  border-radius:10px;
  box-shadow:0 0 15px rgba(0,0,0,0.1);
}

.container h2{
  text-align:center;
  margin-bottom:25px;
}

/* FORM */
input, textarea{
  width:100%;
  padding:12px;
  margin:12px 0;
  border:1px solid #ccc;
  border-radius:5px;
}

input:focus, textarea:focus{
  outline:none;
  border-color:var(--main);
}

/* BUTTON */
button{
  background:var(--main);
  color:white;
  border:none;
  padding:12px;
  width:100%;
  border-radius:5px;
  font-size:16px;
  cursor:pointer;
}

button:hover{
  background:var(--hover);
  color:black;
}

/* SOCIAL BUTTONS */
.socials{
  display:flex;
  justify-content:center;
  gap:20px;
  margin-top:30px;
}

.socials a{
  text-decoration:none;
  padding:10px 26px;
  border-radius:25px;
  border:2px solid #8E1913;
  color:#8E1913;
  font-weight:600;
  transition:0.3s;
}

.socials a:hover{
  background:#D79F90;
  color:black;
  border-color:#D79F90;
}

/* FOOTER */
footer{
  background:#f6f6f6;
  color:#8E1913;
  text-align:center;
  padding:22px;
  margin-top:80px;
  font-size:14px;
  border-top:1px solid #ddd;
}
</style>
</head>

<body>

</ul>
</nav>

<!-- CONTACT -->
<div class="container">
<h2>Contact Us</h2>

<form action="https://formspree.io/f/xvgdoakn" method="POST">

<input type="hidden" name="_subject" value="New Contact Message - Inspired Creations">

<input type="text" name="name" placeholder="Full Name" required>

<input type="email" name="email" placeholder="Email" required>

<textarea name="message" rows="5" placeholder="Message" required></textarea>

<button type="submit">Send Message</button>

</form>

<!-- SOCIAL LINKS -->
<div class="socials">
  <a href="https://wa.me/264814919908" target="_blank">WhatsApp</a>
  <a href="https://instagram.com/inspired.creations.namibia" target="_blank">Instagram</a>
</div>
</div>

<footer>

</html>
