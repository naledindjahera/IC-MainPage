<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Page Not Found | Inspired Creations</title>

<style>

:root{
  --main:#8E1913;
  --hover:#D79F90;
  --light:#f6f6f6;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:"Segoe UI", sans-serif;
}

body{
  background:#f2f2f2;
  display:flex;
  align-items:center;
  justify-content:center;
  height:100vh;
}

/* CONTAINER */

.container{
  background:white;
  padding:50px 40px;
  border-radius:12px;
  text-align:center;
  max-width:500px;
  width:90%;
  box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

/* BIG 404 */

h1{
  font-size:70px;
  color:var(--main);
  margin-bottom:10px;
}

/* TITLE */

h2{
  font-weight:600;
  margin-bottom:15px;
}

/* TEXT */

p{
  color:#555;
  margin-bottom:30px;
  line-height:1.5;
}

/* BUTTON */

a{
  display:inline-block;
  padding:12px 28px;
  background:var(--main);
  color:white;
  text-decoration:none;
  border-radius:6px;
  font-weight:500;
  transition:0.3s;
}

a:hover{
  background:var(--hover);
  color:black;
}

/* LOGO */

.logo{
  width:320px;
  margin-bottom:20px;
}

/* MOBILE */

@media (max-width:600px){

  h1{
    font-size:55px;
  }

  .container{
    padding:35px 25px;
  }

}

</style>
</head>

<body>

<div class="container">

<img src="logo1.png" class="logo">

<h1>404</h1>

<h2>Oops! Page Not Found</h2>

<p>
The page you're looking for doesn't exist or may have been moved.
</p>

<a href="index.html">Back to Home</a>

</div>

</body>
</html>
