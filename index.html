<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home | Inspired Creations</title>
<link rel="stylesheet" href="responsive.css">
<style>
:root{
  --main:#8E1913;
  --hover:#D79F90;
  --dark:#1e1e1e;
  --light:#f6f6f6;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family: "Segoe UI", sans-serif;
}

body{
  background:#f2f2f2;
  color:#333;
  overflow-x:hidden;
}
/* NAV */
nav{
  background:#222;
  padding:15px;
}

nav ul{
  list-style:none;
  display:flex;
  flex-wrap:wrap;          /* allows wrapping */
  gap:15px;
  justify-content:center;
}

nav a{
  color:white;
  text-decoration:none;
  padding:8px 14px;
  border-radius:6px;
  transition:0.3s;
  font-weight:500;
}

nav a:hover{
  background:var(--main);  /* better match */
  color:white;
}

nav a.active{
  background:var(--main);
  color:white;
}



/* HERO */

.hero{
  background:white;
  padding:60px 20px;
  text-align:center;
  width:90%;
  max-width:900px;
  margin:40px auto;
  border-radius:12px;
}
.hero h1{
  font-style:italic;
  margin-bottom:40px;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit, minmax(180px,1fr));
  gap:20px;
  max-width:900px;
  margin:0 auto;
}

.card{
  background:var(--main);
  height:380px;
  border-radius:10px;
  cursor:pointer;
  transition:0.3s;
}

.card:hover{
  background:var(--hover);
  transform:scale(1.05);
}

/* BUTTON ROW */
.quick-links{
  margin-top:30px;
  display:flex;
  justify-content:center;
  gap:15px;
}

.quick-links a{
  background:var(--main);
  color:white;
  padding:10px 20px;
  border-radius:20px;
  text-decoration:none;
}

.quick-links a:hover{
  background:var(--hover);
  color:black;
}

/* CONTENT */
.section{
  background:white;
  padding:40px;
  margin:40px auto;
  max-width:900px;
  width:90%;
  border-radius:12px;
}

.section h2{
  text-decoration:underline;
  margin-bottom:15px;

}


.admin-panel{
  display:none;
  position:fixed;
  right:20px;
  top:50%;
  transform:translateY(-50%);
  display:none;
  flex-direction:column;
  gap:12px;
  z-index:999;
}

.admin-btn{
  background:var(--main);
  color:white;
  border:none;
  padding:12px 18px;
  border-radius:10px;
  cursor:pointer;
  font-size:14px;
  box-shadow:0 4px 10px rgba(0,0,0,0.2);
}

.admin-btn:hover{
  background:var(--hover);
  color:black;
}

.admin-toggle{
  text-align:center;
  margin:30px;
}

.home-card{
  position:relative;
  width:100%;
  aspect-ratio: 1 / 1;   /* keeps square cards */
  border-radius:14px;
  overflow:hidden;
  cursor:pointer;
}

.home-card img{
  width:100%;
  height:100%;
  object-fit:cover;
}

.delete-home{
  position:absolute;
  top:8px;
  right:8px;
  background:#8E1913;
  color:white;
  border:none;
  border-radius:50%;
  width:24px;
  height:24px;
  cursor:pointer;
}


/* MODAL OVERLAY */
.modal{
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.6);
  z-index:2000;
}

/* MODAL BOX */
.modal-content{
  background:white;
  width:90%;
  max-width:500px;
  margin:100px auto;
  padding:30px;
  border-radius:14px;
  box-shadow:0 8px 30px rgba(0,0,0,0.3);
}

/* TEXTAREA */
.modal-content textarea{
  width:100%;
  padding:12px;
  border-radius:8px;
  border:2px solid var(--main);
  resize:none;
  margin-bottom:20px;
  font-size:14px;
}

/* MODAL BUTTONS */
.modal-content .admin-btn{
  margin-right:10px;
}


/* ADMIN FLOATING MENU */
.admin-menu{
  position:fixed;
  bottom:70px;
  right:20px;
  z-index:3000;
}

/* THREE DOT BUTTON */
.admin-dots{
  width:42px;
  height:42px;
  border-radius:50%;
  background:#8E1913;
  color:white;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:22px;
  cursor:pointer;
  box-shadow:0 4px 10px rgba(0,0,0,0.3);
}

/* PANEL */
#adminMenuPanel{
  display:none;
  position:absolute;
  bottom:55px;
  right:0;
  background:white;
  padding:10px;
  border-radius:10px;
  box-shadow:0 6px 20px rgba(0,0,0,0.3);
}

#adminMenuPanel button{
  width:140px;
  background:#8E1913;
  color:white;
  border:none;
  padding:8px;
  border-radius:6px;
  margin:5px 0;
  cursor:pointer;
}

#adminMenuPanel button:hover{
  background:#D79F90;
  color:black;
}

/* BOTTOM GALLERY */
.bottom-gallery{
  max-width:600px;
  margin:30px auto;
  display:grid;
  grid-template-columns:repeat(auto-fit, minmax(180px,1fr));
  gap:20px;
}

.bottom-item{
  position:relative;
  height:250px;
  background:#8E1913;
  border-radius:12px;
  overflow:hidden;
}

.bottom-item img{
  width:100%;
  height:100%;
  object-fit:cover;
}

/* delete button */
.delete-bottom{
  position:absolute;
  top:6px;
  right:6px;
  width:24px;
  height:24px;
  border-radius:50%;
  background:#8E1913;
  color:white;
  border:none;
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
}

.delete-bottom:hover{
  background:#D79F90;
  color:black;
}

/* MODAL OVERLAY */
.modal{
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.6);
  z-index:2000;
}

/* MODAL BOX */
.modal-content{
  background:white;
  width:90%;
  max-width:500px;
  margin:100px auto;
  padding:30px;
  border-radius:16px;
  box-shadow:0 10px 40px rgba(0,0,0,0.3);
  animation:fadeIn 0.3s ease;
}

@keyframes fadeIn{
  from{ transform:translateY(-20px); opacity:0; }
  to{ transform:translateY(0); opacity:1; }
}

.modal-content textarea,
.modal-content input{
  width:100%;
  padding:12px;
  border-radius:10px;
  border:2px solid #8E1913;
  margin-bottom:20px;
  font-size:14px;
}

.edit-home,
.edit-bottom{
  position:absolute;
  top:8px;
  left:8px;
  background:#8E1913;
  color:white;
  border:none;
  width:24px;
  height:24px;
  border-radius:50%;
  cursor:pointer;
  font-size:14px;
  display:flex;
  align-items:center;
  justify-content:center;
}

.edit-home:hover,
.edit-bottom:hover{
  background:#D79F90;
  color:black;
}

@media (max-width:768px){

.hero{
  background:white;
  padding:60px 20px;
  text-align:center;
  width:90%;
  max-width:400px;
  margin:40px auto;
  border-radius:12px;
}
.section{
  background:white;
  padding:40px;
  margin:40px auto;
  max-width:900px;
  width:90%;
  border-radius:12px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit, minmax(180px,1fr));
    grid-template-columns:1fr 1fr 1fr 1fr;
  gap:20px;
  max-width:900px;
  margin:0 auto;
}

}

/* FOOTER */
footer{
  background:#f6f6f6;
  color:#8E1913;
  text-align:center;
  padding:22px;
  margin-top:80px;
  font-size:14px;
  border-top:1px solid #ddd;
}


</style>
</head>

<body>



<section class="hero">
<h1> <img src="logo1.png" alt="Inspired Creations Logo"><br>the home of</h1>

<div class="grid" id="homeGrid">
  <div class="card" onclick="location.href='urpottery.html'"></div>
  <div class="card" onclick="location.href='potterywine.html'"></div>
  <div class="card" onclick="location.href='coupledn.html'"></div>
  <div class="card" onclick="location.href='potteryspeed.html'"></div>
</div>

<div class="quick-links">
<a href="gallery.html">Gallery</a>
<a href="contact.html">Contact Us</a>
<a href="about.html">About Us</a>
</div>
</section>

<section class="section">
<h2>Our Story</h2>
<p id="homeStory"></p>
</section>

<section class="section">
<h2>Meet The Founder</h2>
<p id="homeFounder"></p>
</section>
<!-- BOTTOM IMAGE GALLERY -->
<section class="section">

  <div class="bottom-gallery" id="homeBottomGallery"></div>
</section>

<div class="admin-panel" id="homeAdminPanel">

<button class="admin-btn" onclick="openHomeCardModal()">
Add Grid Image
</button>

<button class="admin-btn" onclick="openParagraphModal('story')">Edit Our Story</button>
<button class="admin-btn" onclick="openParagraphModal('founder')">Edit Founder</button>

<label class="admin-btn">
  Add Bottom Grid
  <input type="file" accept="image/*" hidden onchange="addBottomImage(event)">
</label>



</div>
<!-- EDIT PARAGRAPH MODAL -->
<div id="paragraphModal" class="modal">

  <div class="modal-content">

    <h3>Edit Paragraph</h3>

    <textarea id="paragraphTextarea"
      rows="6"
      placeholder="Type your paragraph here..."></textarea>

    <button class="admin-btn" onclick="saveParagraphModal()">Save</button>
    <button class="admin-btn" onclick="closeParagraphModal()">Close</button>

  </div>

</div>


<!-- ADMIN MINI MENU -->
<div class="admin-menu">

  <div class="admin-dots" onclick="toggleAdminMenu()">⋯</div>

<div id="adminMenuPanel">
<button onclick="openAdminLogin()">Enable Admin</button>
<button onclick="disableAdmin()">Disable Admin</button>
<button onclick="openChangePassword()">Change Password</button>
</div>


</div>

<!-- PARAGRAPH MODAL -->
<div id="speedParagraphModal" class="modal">
  <div class="modal-content">
    <h3>Edit Speeddating Description</h3>
    <textarea id="speedTextarea" rows="6"></textarea>
    <button class="admin-btn" onclick="saveSpeedParagraph()">Save</button>
    <button class="admin-btn" onclick="closeSpeedParagraphModal()">Close</button>
  </div>
</div>

<!-- FORM LINK MODAL -->
<div id="speedFormModal" class="modal">
  <div class="modal-content">
    <h3>Set Registration Form Link</h3>
    <input id="speedFormInput" type="text" placeholder="Paste form link here...">
    <button class="admin-btn" onclick="saveSpeedFormLink()">Save</button>
    <button class="admin-btn" onclick="closeSpeedFormModal()">Close</button>
  </div>
</div>

<div id="homeCardModal" class="modal">

  <div class="modal-content">

    <h3>Add Homepage Card</h3>

    <label>Choose Page</label>
    <select id="homePageSelect">
      <option value="urpottery.html">UR Pottery</option>
      <option value="potterywine.html">Pottery & Wine</option>
      <option value="coupledn.html">Couples Date Night</option>
      <option value="potteryspeed.html">Speeddating</option>
    </select>

    <label>Upload Image</label>
    <input type="file" id="homeImageFile" accept="image/*">

    <div style="display:flex; gap:10px;">
      <button class="admin-btn" onclick="saveHomeCard()">Add Card</button>
      <button class="admin-btn" onclick="closeHomeCardModal()">Cancel</button>
    </div>

  </div>

</div>


<div id="adminLoginModal" class="modal">

  <div class="modal-content">

    <h3>Admin Login</h3>

    <input id="adminUserInput"
      type="text"
      placeholder="Username">

    <input id="adminPassInput"
      type="password"
      placeholder="Password">

    <div style="display:flex; gap:10px;">
      <button class="admin-btn" onclick="loginAdmin()">Login</button>
      <button class="admin-btn" onclick="closeAdminLogin()">Cancel</button>
    </div>

  </div>

</div>

<div id="changePasswordModal" class="modal">

  <div class="modal-content">

    <h3>Admin Settings</h3>

    <label>Change Username</label>
    <input id="newUsername" type="text" placeholder="New Username">

    <label>Current Password</label>
    <input id="currentPassword" type="password" placeholder="Current Password">

    <label>New Password</label>
    <input id="newPassword" type="password" placeholder="New Password">

    <label>Confirm Password</label>
    <input id="confirmPassword" type="password" placeholder="Confirm New Password">

    <div style="display:flex; gap:10px;">
      <button class="admin-btn" onclick="updateAdminCredentials()">Save Changes</button>
      <button class="admin-btn" onclick="closeChangePassword()">Cancel</button>
    </div>

  </div>

</div>


<footer>
2026 Inspired Creations • Powered by Purple Web Codes
</footer>

<script src="home.js"></script>
<script type="module" src="firebase.js"></script>

</body>
</html>
