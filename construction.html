<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Coming Soon | Inspired Creations</title>

<style>

:root{
  --main:#8E1913;
  --hover:#D79F90;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:"Segoe UI", sans-serif;
}

body{
  background:#f2f2f2;
  display:flex;
  align-items:center;
  justify-content:center;
  height:100vh;
  text-align:center;
}

/* CONTAINER */

.container{
  background:white;
  padding:50px 40px;
  border-radius:12px;
  max-width:520px;
  width:90%;
  box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

/* LOGO */

.logo{
  width:320px;
  margin-bottom:20px;
}
/* TITLE */

h1{
  font-size:40px;
  color:#8E1913;
  margin-bottom:10px;
}

/* SUBTEXT */

p{
  color:#555;
  margin-bottom:30px;
  line-height:1.6;
}

/* BUTTON */

a{
  display:inline-block;
  padding:12px 26px;
  background:#8E1913;
  color:white;
  text-decoration:none;
  border-radius:6px;
  font-weight:500;
  transition:0.3s;
}

a:hover{
  background:#D79F90;
  color:black;
}

/* MOBILE */

@media (max-width:600px){

.container{
padding:35px 25px;
}

h1{
font-size:32px;
}

}

</style>
</head>

<body>

<div class="container">

<img src="logo1.png" class="logo">

<h1>Page Under Construction</h1>

<p id="constructionText">
We're currently working on something exciting for Inspired Creations.
This page will be available soon.
</p>

<a href="index.html">Back to Home</a>

</div>

<script>
const API = "http://localhost:3000/construction";

async function loadMessage(){

 try{

  const res = await fetch(API);
  const data = await res.json();

  if(data && data.text){
   document.getElementById("constructionText").innerText = data.text;
  }

 }catch(err){

  console.log("Server not connected yet");

 }

}

loadMessage();
</script>

</body>
</html>
