<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UR Pottery | Inspired Creations</title>
<link rel="stylesheet" href="responsive.css">
<style>
:root{
  --main:#8E1913;
  --hover:#D79F90;
  --light:#f6f6f6;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:"Segoe UI", sans-serif;
}

body{
  background:#f2f2f2;
}

/* NAVBAR */
nav{
  background:#f6f6f6;
  padding:18px;
  border-bottom:1px solid #ddd;
}

nav ul{
  list-style:none;
  display:flex;
  justify-content:center;
  gap:25px;
}

nav a{
  color:#8E1913;
  text-decoration:none;
  padding:8px 14px;
  border-radius:5px;
  font-weight:500;
  transition:0.3s;
}

nav a:hover{
  color:black;
  background:#D79F90;

}

nav a.active{
  color:black;
  text-decoration:underline;
}


/* PAGE TITLE */
.page-title{
  padding:30px 20px;
  font-size:22px;
  font-weight:600;
  text-align: center;

}

/* TOP SECTION */
.top-section{
  display:flex;
  justify-content:center;
  gap:30px;
  padding:30px;
  flex-wrap:wrap;
}

.box{
  width:160px;
  height:160px;
  background:var(--main);
  border-radius:10px;
  transition:0.3s;
}

.box:hover{
  background:var(--hover);
  transform:scale(1.05);
}

.slideshow{
  width:200px;
  height:160px;
  background:var(--main);
  color:white;
  display:flex;
  align-items:center;
  justify-content:center;
  border-radius:10px;
  text-align:center;
  padding:10px;
}

/* STORY SECTION */
.story{
  max-width:900px;
  margin:40px auto;
  padding:20px;
}

.story h2{
  text-align:center;
  margin-bottom:20px;
  border-bottom:2px solid #ccc;
  display:inline-block;
  padding-bottom:5px;
}

.story p{
  margin:20px 0;
  line-height:1.6;
}

/* BOTTOM GRIDS */
.grid-two, .grid-three{
  display:flex;
  justify-content:center;
  gap:30px;
  margin:50px 0;
  width:50px;
  height:160px;
  flex-wrap:wrap;
}

.small-box{
  width:150px;
  height:150px;
  background:var(--main);
  border-radius:10px;
  transition:0.3s;
}

.small-box:hover{
  background:var(--hover);
  transform:scale(1.05);
}

.media-grid{
  max-width:900px;
  margin:40px auto;
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  gap:20px;
}

.media-item{
  max-width:900px;
  position:relative;
  height:220px;
  background:#8E1913;
  border-radius:12px;
  overflow:hidden;
}

.media-item img,
.media-item video{
  width:100%;
  height:100%;
  object-fit:cover;
    max-width:900px;

}

.media-grid .big{
  grid-row:1 / span 2;
}

.bottom-gallery{
  max-width:900px;
  margin:60px auto;
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(150px,1fr ));
  grid-template-columns:1fr 1fr 1fr;
  gap:20px;
}

.delete-btn{
  position:absolute;
  top:8px;
  right:8px;
  background:#8E1913;
  color:white;
  border:none;
  width:24px;
  height:24px;
  border-radius:50%;
  cursor:pointer;
}

/* ADMIN PANEL */
.admin-panel{
  display:none;
  position:fixed;
  right:20px;
  top:50%;
  transform:translateY(-50%);
  display:none;
  flex-direction:column;
  gap:12px;
  z-index:999;
}

.admin-btn{
  background:#8E1913;
  color:white;
  border:none;
  padding:12px 18px;
  border-radius:10px;
  cursor:pointer;
  font-size:14px;
  box-shadow:0 4px 10px rgba(0,0,0,0.2);
}

.admin-btn:hover{
  background:#D79F90;
  color:black;
}

/* ADMIN DOT MENU */
.admin-menu{
  position:fixed;
  bottom:20px;
  right:20px;
  z-index:9999;
}

.admin-dots{
  background:#8E1913;
  color:white;
  width:42px;
  height:42px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:22px;
  cursor:pointer;
}

#adminMenuPanel{
  display:none;
  position:absolute;
  bottom:55px;
  right:0;
  background:white;
  padding:10px;
  border-radius:10px;
  box-shadow:0 5px 20px rgba(0,0,0,0.3);
}

#adminMenuPanel button{
  background:#8E1913;
  color:white;
  border:none;
  padding:8px 12px;
  border-radius:6px;
  margin:5px 0;
  width:140px;
  cursor:pointer;
}

#adminMenuPanel button:hover{
  background:#D79F90;
  color:black;
}

/* MODAL */
.modal{
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.6);
  z-index:2000;
}

.modal-content{
  background:white;
  width:90%;
  max-width:500px;
  margin:100px auto;
  padding:30px;
  border-radius:14px;
}

.modal-content textarea{
  width:100%;
  padding:12px;
  border-radius:8px;
  border:2px solid #8E1913;
  resize:none;
  margin-bottom:20px;
}


@keyframes modalFade{
  from{
    transform:translateY(-20px);
    opacity:0;
  }
  to{
    transform:translateY(0);
    opacity:1;
  }
}
/* INPUTS */
.modal input,
.modal textarea{
  width:100%;
  padding:12px;
  border-radius:8px;
  border:2px solid #8E1913;
  resize:none;
  margin-bottom:20px;
}

.edit-btn{
  position:absolute;
  top:8px;
  left:8px;
  background:#8E1913;
  color:white;
  border:none;
  width:24px;
  height:24px;
  border-radius:50%;
  cursor:pointer;
  font-size:14px;
  display:flex;
  align-items:center;
  justify-content:center;
}

.edit-btn:hover{
  background:#D79F90;
  color:black;
}


/* FOOTER */
footer{
  background:#f6f6f6;
  color:#8E1913;
  text-align:center;
  padding:22px;
  margin-top:80px;
  font-size:14px;
  border-top:1px solid #ddd;
}
</style>
</head>

<body>

<nav>
<ul>
<li><a href="index.html">Home</a></li>
<li><a href="urpottery.html" class="active">UR Pottery</a></li>
<li><a href="potterywine.html">Pottery & Wine</a></li>
<li><a href="coupledn.html">Couples Date Night</a></li>
<li><a href="potteryspeed.html">Speeddating</a></li>
<li><a href="gallery.html">Gallery</a></li>
<li><a href="about.html">About Us</a></li>
<li><a href="contact.html">Contact Us</a></li>

</ul>
</nav>

<div class="page-title">UR Pottery</div>


<!-- TOP SECTION -->
<div class="media-grid" id="topMediaGrid"></div>


<!-- STORY -->
<div class="story">
  <h2>Our Story</h2>
  <p id="urStory"></p>
</div>

<!-- BOTTOM GALLERY -->
<div class="bottom-gallery" id="bottomGallery"></div>


<!-- ADMIN PANEL -->
<div class="admin-panel" id="urAdminPanel">

  <label class="admin-btn">
    Add Top Image
    <input type="file" accept="image/*" hidden onchange="addTopImage(event)">
  </label>

  <label class="admin-btn">
    Add Slideshow Video
    <input type="file" accept="video/*" hidden onchange="addSlideshow(event)">
  </label>

  <label class="admin-btn">
    Add Bottom Image
    <input type="file" accept="image/*" hidden onchange="addBottomImage(event)">
  </label>

  <button class="admin-btn" onclick="openStoryEditor()">Edit Story</button>

</div>

<!-- STORY MODAL -->
<div id="storyModal" class="modal">
  <div class="modal-content">
    <h3>Edit Story</h3>
    <textarea id="storyTextarea" rows="6"></textarea>
    <button class="admin-btn" onclick="saveStory()">Save</button>
    <button class="admin-btn" onclick="closeStoryEditor()">Close</button>
  </div>
</div>

<!-- ADMIN DOTS -->
<div class="admin-menu">
  <div class="admin-dots" onclick="toggleAdminMenu()">⋯</div>
  <div id="adminMenuPanel">
<button onclick="openAdminLogin()">Enable Admin</button>
    <button onclick="disableAdmin()">Disable Admin</button>
  </div>
</div>

<div id="adminLoginModal" class="modal">
<div class="modal-content">

<h3>Admin Login</h3>

<input id="adminUserInput" placeholder="Username">
<input id="adminPassInput" type="password" placeholder="Password">

<div class="modal-actions">
<button class="admin-btn" onclick="loginAdmin()">Login</button>
<button class="admin-btn cancel-btn" onclick="closeAdminLogin()">Cancel</button>
</div>

</div>
</div>

<div id="changePasswordModal" class="modal">
<div class="modal-content">

<h3>Admin Settings</h3>

<input id="newUsername" placeholder="New Username">
<input id="currentPassword" type="password" placeholder="Current Password">
<input id="newPassword" type="password" placeholder="New Password">
<input id="confirmPassword" type="password" placeholder="Confirm Password">

<div class="modal-actions">
<button class="admin-btn" onclick="updateAdminCredentials()">Save</button>
<button class="admin-btn cancel-btn" onclick="closeChangePassword()">Cancel</button>
</div>

</div>
</div>

<script src="urpottery.js"></script>
<script src="admin.js"></script>
<script type="module" src="firebase.js"></script>
<footer>
2026 Inspired Creations • Powered by Purple Web Codes
</footer>

</body>
</html>
